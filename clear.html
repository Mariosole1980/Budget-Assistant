<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ενημέρωση Budget Assistant...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
      padding: 32px;
      text-align: center;
    }
    .icon { font-size: 64px; animation: spin 1.5s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    h1 { font-size: 22px; font-weight: 700; color: #58a6ff; }
    p { font-size: 15px; color: #8b949e; max-width: 320px; line-height: 1.6; }
    .status { font-size: 13px; color: #3fb950; font-family: monospace; background: #161b22; padding: 12px 20px; border-radius: 8px; border: 1px solid #30363d; min-width: 280px; }
    .btn {
      margin-top: 8px;
      background: #238636;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">🔄</div>
  <h1>Καθαρισμός Cache...</h1>
  <p>Διαγράφω παλιά δεδομένα και ενημερώνω την εφαρμογή στην τελευταία έκδοση.</p>
  <div class="status" id="status">⏳ Εκκίνηση...</div>
  <button class="btn" id="goBtn" onclick="window.location.replace('/')">🚀 Άνοιξε την Εφαρμογή</button>

  <script>
    var status = document.getElementById('status');
    var goBtn = document.getElementById('goBtn');
    var steps = [];

    function log(msg) {
      status.textContent = msg;
      console.log(msg);
    }

    async function nukeEverything() {
      // Step 1: Unregister all Service Workers
      if ('serviceWorker' in navigator) {
        try {
          log('🗑️ Αφαίρεση Service Workers...');
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) {
            await regs[i].unregister();
          }
          log('✅ ' + regs.length + ' Service Worker(s) αφαιρέθηκαν');
        } catch(e) {
          log('⚠️ SW error: ' + e.message);
        }
      }

      await sleep(300);

      // Step 2: Clear all caches
      if ('caches' in window) {
        try {
          log('🗑️ Καθαρισμός Cache Storage...');
          var keys = await caches.keys();
          for (var i = 0; i < keys.length; i++) {
            await caches.delete(keys[i]);
          }
          log('✅ ' + keys.length + ' cache(s) διαγράφηκαν');
        } catch(e) {
          log('⚠️ Cache error: ' + e.message);
        }
      }

      await sleep(300);

      // Step 3: Clear localStorage update keys
      try {
        log('🗑️ Καθαρισμός localStorage...');
        localStorage.removeItem('_ba_last_update_check');
        localStorage.removeItem('_ba_last_reload_build');
        localStorage.removeItem('last_update_attempt');
        log('✅ localStorage καθαρίστηκε');
      } catch(e) {}

      await sleep(300);

      log('✅ Έτοιμο! Ανακατεύθυνση...');

      await sleep(800);

      // Redirect to fresh app - clean URL, no params
      window.location.replace('/');
    }

    function sleep(ms) {
      return new Promise(function(r) { setTimeout(r, ms); });
    }

    // Start the process
    nukeEverything().catch(function(e) {
      log('❌ Σφάλμα: ' + e.message);
      goBtn.style.display = 'block';
    });
  </script>

  <!-- Fallback: if JS fails, meta-refresh after 5 seconds -->
  <noscript>
    <meta http-equiv="refresh" content="2; url=/?_clear=1">
  </noscript>
</body>
</html>
